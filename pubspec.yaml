name: misfits
description: "Misfits mobile game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  freezed: ^3.2.5
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  path_provider: ^2.1.5
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  go_router: ^17.2.3
  go_router_builder: ^4.3.0
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3
  flutter_launcher_icons: "^0.14.4"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/misfits_launcher_icon_1024.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/misfits_foreground_1024.png"

flutter_native_splash:
  color: "#000000"
  image: assets/splash/misfits_splash_full_1152.png

  android_12:
    color: "#000000"
    image: assets/splash/misfits_splash_android12_960.png

flutter:
  uses-material-design: true
  generate: true
    