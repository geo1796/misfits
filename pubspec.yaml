name: misfits
description: "Misfits mobile game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  freezed: ^3.2.5
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1
  path_provider: ^2.1.5
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.5.5
  go_router: ^17.2.3
  go_router_builder: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3


flutter:
  uses-material-design: true
  generate: true
